    <main class="app">
      <section class="hud" aria-label="关卡信息">

          <p class="eyebrow">伏地魔决战</p>
          <h1 id="levelTitle">加载中</h1>
          <p id="levelBrief" class="brief">按住蓝色地块，拖到相邻目标后松手派兵。</p>

        <div class="actions">
          <a class="button-link" href="hogwarts-playtest.html">霍格沃茨地图</a>

          <button id="restartLevel" type="button">重开</button>
          <button id="nextLevel" type="button">下一关</button>
        </div>
